name: sylphos
channels:
  - conda-forge
dependencies:
  # ---- 基础 ----
  - python=3.12
  - fastapi
  - uvicorn
  - pydantic
  - pyyaml
  - python-dotenv
  - orjson
  - requests
  - numpy

  # ---- 音频与语音 ----
  - sounddevice
  - webrtcvad
  - portaudio
  - ffmpeg
  - espeak-ng

  # ---- TTS（可选）----
  # 正式 TTS 模块使用 CosyVoice，建议在 Python 3.12 环境中按 docs/tts_cosyvoice.md 单独安装 requirements-tts.txt。

  # ---- 工具与开发 ----
  - pip
  - rich
  - httpx
  - pytest

  # ---- 通过 pip 安装的包 ----
  - pip:
      # STT
      - faster-whisper
      - ctranslate2
      - openwakeword
      - modelcontextprotocol
      # TTS
      # CosyVoice 依赖不放入主环境，按需执行: pip install -r requirements-tts.txt
